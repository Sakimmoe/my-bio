<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>油咖喱 | Yukari's Bio</title>
    <!-- 引入温馨的字体和精致图标 -->
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --main-color: #b39ddb; /* 优雅的御币紫 */
            --accent-color: #ffb7c5; /* 唯美的樱花粉 */
            --text-color: #5c5266; /* 柔和的深灰紫 */
            --bg-gradient: linear-gradient(135deg, #e8f0fe 0%, #fbf0f3 50%, #f3e5f5 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Kosugi Maru', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* --- 纯CSS二次元动态樱花飘落效果 --- */
        .cherry-blossom-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .petal {
            position: absolute;
            background: var(--accent-color);
            border-radius: 150% 0 150% 150%;
            opacity: 0.6;
            animation: float-down linear infinite;
        }

        @keyframes float-down {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(105vh) translateX(100px) rotate(720deg); opacity: 0; }
        }

        /* 生成不同大小和速度的瓣儿 */
        .petal:nth-child(1) { width: 12px; height: 8px; left: 10%; animation-duration: 8s; animation-delay: 0s; }
        .petal:nth-child(2) { width: 16px; height: 11px; left: 30%; animation-duration: 12s; animation-delay: 2s; }
        .petal:nth-child(3) { width: 10px; height: 7px; left: 55%; animation-duration: 9s; animation-delay: 4s; }
        .petal:nth-child(4) { width: 14px; height: 10px; left: 75%; animation-duration: 11s; animation-delay: 1s; }
        .petal:nth-child(5) { width: 12px; height: 8px; left: 90%; animation-duration: 7s; animation-delay: 5s; }

        /* --- 主卡片组件（半透明空气感） --- */
        .bio-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 32px;
            padding: 45px 35px 35px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(179, 157, 219, 0.15);
        }

        /* 头像（日系软萌圆角框） */
        .avatar-wrap {
            width: 105px;
            height: 105px;
            margin: 0 auto 20px;
            position: relative;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 100%);
            border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: var(--main-color);
            font-weight: bold;
            object-fit: cover;
        }

        /* 名字与专属域名徽章 */
        .name {
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: #4a4254;
            margin-bottom: 6px;
        }

        .domain-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-family: monospace;
            padding: 3px 12px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--main-color);
            border: 1px solid rgba(179, 157, 219, 0.4);
            border-radius: 30px;
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        /* 清新排版文字区 */
        .bio-content {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-color);
            margin-bottom: 30px;
            text-align: left;
            background: rgba(255, 255, 255, 0.3);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .bio-content p {
            margin-bottom: 10px;
        }
        .bio-content p:last-child {
            margin-bottom: 0;
        }

        /* 标签小可爱 */
        .tag-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .tag-node {
            font-size: 0.8rem;
            padding: 4px 12px;
            background: rgba(179, 157, 219, 0.12);
            color: #7e57c2;
            border-radius: 12px;
        }

        /* 唯美扁平化链接按钮 */
        .links-gate {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .gate-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 22px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 400;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.01);
        }

        .gate-button i.left-ico {
            margin-right: 12px;
            color: var(--main-color);
            font-size: 1.1rem;
        }

        .gate-button i.arrow {
            color: #ccc;
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }

        /* 悬停动画：亮色柔和放大 */
        .gate-button:hover {
            background: #fff;
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 183, 197, 0.25);
            color: #333;
        }

        .gate-button:hover i.arrow {
            transform: translateX(3px);
            color: var(--accent-color);
        }

        .footer {
            margin-top: 35px;
            font-size: 0.75rem;
            color: #a097a8;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- 动态樱花层 -->
    <div class="cherry-blossom-container">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
    </div>

    <!-- 个人名片主体 -->
    <div class="bio-card">
        
        <!-- 头像（若想放动漫萌图，直接把下面这一行换成 <img src="图片链接" class="avatar"> ） -->
        <div class="avatar-wrap">
            <div class="avatar">油</div>
        </div>

        <div class="name">油咖喱</div>
        <div class="domain-badge">yukari.bio</div>

        <div class="tag-container">
            <span class="tag-node">🌸 二次元</span>
            <span class="tag-node">🔮 独立建站</span>
            <span class="tag-node">🎵 声音收集</span>
        </div>

        <!-- 个人文字介绍区（可在此自由修改文字描述） -->
        <div class="bio-content">
            <p>👋 哈喽，这里是油咖喱（Yukari）的后花园。</p>
            <p>✨ 是一名徜徉在 ACGN 幻想世界里的观测者，同时也对独立建站、自建极客服务有着莫名执念的技术同好。</p>
            <p>🎧 喜欢收集各种高码率的治愈系音乐。日常喜欢在网络的角落里搭建属于自己的秘密基地，很高兴在这里与你相遇。</p>
        </div>

        <!-- 外部导航入口 -->
        <div class="links-gate">
            <a href="https://github.com" target="_blank" class="gate-button">
                <span><i class="fab fa-github left-ico"></i>GitHub 空间</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>
            <a href="#" class="gate-button">
                <span><i class="fas fa-feather-alt left-ico"></i>个人博客 / 门扉</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>
            <a href="#" class="gate-button">
                <span><i class="fas fa-compact-disc left-ico"></i>云端音乐小镇</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>
        </div>

        <div class="footer">
            © 2026 油咖喱 · 留白处的星空
        </div>
    </div>

</body>
</html>
