<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>油咖喱的个人主页</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #9d4edd;
            --primary-glow: #e0aaff;
            --background: #0f0c1b;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
            --text: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 动态渐变背景背景 */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #7b2cbf, #e0aaff);
            border-radius: 50%;
            top: 15%;
            left: 15%;
            filter: blur(120px);
            z-index: -1;
            animation: float 8s infinite alternate;
        }

        body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: linear-gradient(45deg, #3c096c, #5a189a);
            border-radius: 50%;
            bottom: 15%;
            right: 15%;
            filter: blur(130px);
            z-index: -1;
            animation: float 12s infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-30px) scale(1.1); }
        }

        /* 核心毛玻璃卡片 */
        .container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .container:hover {
            border-color: rgba(157, 78, 221, 0.4);
            box-shadow: 0 20px 50px rgba(157, 78, 221, 0.15);
        }

        /* 头像组件 - 自带炫彩呼吸灯边缘 */
        .avatar-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
        }

        .avatar-glow {
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            background: linear-gradient(45deg, var(--primary), #ff9e00, var(--primary-glow));
            border-radius: 50%;
            z-index: -1;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a0ca3, #7209b7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #fff;
            font-weight: bold;
            border: 3px solid #0f0c1b;
            object-fit: cover;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, var(--primary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tag {
            display: inline-block;
            font-size: 0.85rem;
            padding: 4px 12px;
            background: rgba(157, 78, 221, 0.2);
            color: var(--primary-glow);
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(157, 78, 221, 0.3);
        }

        .bio {
            font-size: 0.95rem;
            color: #ccccff;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* 链接列表 */
        .links-flex {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .link-item i {
            font-size: 1.2rem;
            color: var(--primary-glow);
            transition: transform 0.25s ease;
        }

        .link-item:hover {
            background: rgba(157, 78, 221, 0.15);
            border-color: var(--primary);
            transform: translateX(4px);
        }

        .link-item:hover i {
            transform: scale(1.2);
        }

        .footer {
            margin-top: 35px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-container">
            <div class="avatar-glow"></div>
            <div class="avatar">油</div>
        </div>

        <h1>油咖喱</h1>
        <div class="tag">ACGN / 独立建站 / 技术好哥们</div>

        <p class="bio">
            欢迎来到我的个人秘密基地✨。<br>
            喜欢折腾服务器，也热爱二次元里的浪漫。这里记录着我的各种奇思妙想与奇妙旅程，很高兴认识你！
        </p>

        <div class="links-flex">
            <a href="https://github.com" target="_blank" class="link-item">
                <span><i class="fab fa-github" style="margin-right: 10px;"></i> GitHub 空间</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="#" class="link-item">
                <span><i class="fas fa-blog" style="margin-right: 10px;"></i> 个人主页</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="#" class="link-item">
                <span><i class="fas fa-music" style="margin-right: 10px;"></i> 我的音乐站</span>
                <i class="fas fa-chevron-right"></i>
            </a>
        </div>

        <div class="footer">
            © 2026 油咖喱. All rights reserved.
        </div>
    </div>

</body>
</html>
